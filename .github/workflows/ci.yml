name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (with coverage report)
        # Coverage is report-only (no thresholds), so this never fails on
        # coverage — the summary just prints in the job log for visibility.
        run: pnpm -r run test:coverage

      - name: Lint
        run: pnpm --filter dashboard lint

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Build dashboard
        run: pnpm --filter dashboard build
        # No real database at build time; the dashboard route is dynamic
        # (uses searchParams), so this only needs a valid client URL so
        # db.ts can construct without throwing. TURSO_AUTH_TOKEN is set to an
        # explicit empty string for the file: URL — matching the dev:mock
        # script and the scraper — so the build doesn't depend on an undefined
        # env var.
        env:
          TURSO_URL: file:./ci.db
          TURSO_AUTH_TOKEN: ""
