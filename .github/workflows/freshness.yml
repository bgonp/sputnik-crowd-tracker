name: Data freshness

# Alerts (by failing, which emails the repo owner) when the scraper has stopped
# writing readings — e.g. the Raspberry Pi is down, the gym started IP-blocking,
# or its CSRF markup changed. This job only READS Turso, so unlike the scraper
# it can run from GitHub's cloud runners.

on:
  schedule:
    # Every 15 minutes, around the clock. The check is open-hours-aware
    # (see scraper/src/open-hours.ts) and pauses staleness alerts when every
    # venue is closed, so the scraper's overnight pause doesn't cause false
    # alarms — no daytime-only cron window is needed.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pnpm version comes from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install scraper dependencies
        run: pnpm install --frozen-lockfile --filter scraper

      - name: Check data freshness
        run: pnpm --filter scraper check-freshness
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          FRESHNESS_THRESHOLD_MINUTES: "15"
